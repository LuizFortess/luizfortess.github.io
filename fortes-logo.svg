      <stop offset="0" stop-color="#2C4F8C"/><stop offset="1" stop-color="#13213f"/>
    </linearGradient>
    <linearGradient id="rightMtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#21407a"/><stop offset="1" stop-color="#0e1630"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.45" r="0.55">
